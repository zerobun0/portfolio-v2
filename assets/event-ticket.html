<div style="max-width: 600px; margin: 0 auto;">
  <svg width="600" height="280" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="ticket-shadow">
        <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
      </filter>
      <linearGradient id="ticket-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#EDE9E2;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#F5F0E8;stop-opacity:1" />
      </linearGradient>
    </defs>
    
    <!-- Ticket body -->
    <rect x="20" y="20" width="560" height="240" rx="12" fill="url(#ticket-grad)" stroke="#C8BDBA" stroke-width="1" filter="url(#ticket-shadow)"/>
    
    <!-- Perforated edge line -->
    <line x1="420" y1="20" x2="420" y2="260" stroke="#C8BDBA" stroke-width="1" stroke-dasharray="4 4"/>
    
    <!-- Left section content -->
    <text x="50" y="70" font-family="'Arial Black', Arial, sans-serif" font-size="32" fill="#292524" font-weight="900">
      TECH EXPO
    </text>
    <text x="50" y="100" font-family="Arial, sans-serif" font-size="18" fill="#78716C" font-weight="400">
      Portfolio Showcase 2026
    </text>
    
    <text x="50" y="150" font-family="Arial, sans-serif" font-size="14" fill="#78716C" font-weight="400">
      DATE
    </text>
    <text x="50" y="172" font-family="Arial, sans-serif" font-size="16" fill="#292524" font-weight="500">
      May 22, 2026 · 7:00 PM
    </text>
    
    <text x="50" y="210" font-family="Arial, sans-serif" font-size="14" fill="#78716C" font-weight="400">
      VENUE
    </text>
    <text x="50" y="232" font-family="Arial, sans-serif" font-size="16" fill="#292524" font-weight="500">
      Barking & Dagenham College
    </text>
    
    <!-- Right section - stub -->
    <text x="450" y="80" font-family="Arial, sans-serif" font-size="14" fill="#292524" font-weight="500" text-anchor="middle">
      ADMIT ONE
    </text>
    
    <text x="450" y="120" font-family="'Courier New', monospace" font-size="12" fill="#78716C" text-anchor="middle">
      TICKET #0507
    </text>
    
    <!-- Barcode simulation -->
    <g transform="translate(440, 160)">
      <rect x="0" y="0" width="3" height="40" fill="#292524"/>
      <rect x="5" y="0" width="2" height="40" fill="#292524"/>
      <rect x="9" y="0" width="4" height="40" fill="#292524"/>
      <rect x="15" y="0" width="2" height="40" fill="#292524"/>
      <rect x="19" y="0" width="5" height="40" fill="#292524"/>
      <rect x="26" y="0" width="2" height="40" fill="#292524"/>
      <rect x="30" y="0" width="3" height="40" fill="#292524"/>
      <rect x="35" y="0" width="4" height="40" fill="#292524"/>
    </g>
    
    <text x="450" y="220" font-family="Arial, sans-serif" font-size="11" fill="#78716C" text-anchor="middle">
      TAREK A. UMAR
    </text>
  </svg>
</div>
